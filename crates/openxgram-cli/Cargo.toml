[package]
name = "openxgram-cli"
description = "xgram — OpenXgram command-line interface"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lib]
name = "openxgram_cli"
path = "src/lib.rs"

[[bin]]
name = "xgram"
path = "src/main.rs"

[dependencies]
openxgram-core = { path = "../openxgram-core" }
openxgram-keystore = { path = "../openxgram-keystore" }
openxgram-db = { path = "../openxgram-db" }
openxgram-manifest = { path = "../openxgram-manifest" }
openxgram-memory = { path = "../openxgram-memory" }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
chrono = { workspace = true }
hex = { workspace = true }
sha2 = "0.10"
tar = "0.4"
flate2 = "1"
ratatui = "0.29"

[dev-dependencies]
tempfile = "3"
