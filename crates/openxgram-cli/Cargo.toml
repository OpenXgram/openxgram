[package]
name = "openxgram-cli"
description = "xgram — OpenXgram command-line interface"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lib]
name = "openxgram_cli"
path = "src/lib.rs"

[[bin]]
name = "xgram"
path = "src/main.rs"

[dependencies]
openxgram-core = { path = "../openxgram-core" }
openxgram-keystore = { path = "../openxgram-keystore" }
openxgram-db = { path = "../openxgram-db" }
openxgram-manifest = { path = "../openxgram-manifest" }
openxgram-adapter = { path = "../openxgram-adapter" }
openxgram-mcp = { path = "../openxgram-mcp" }
openxgram-memory = { path = "../openxgram-memory" }
openxgram-scheduler = { path = "../openxgram-scheduler" }
openxgram-transport = { path = "../openxgram-transport" }
openxgram-vault = { path = "../openxgram-vault" }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
chrono = { workspace = true }
hex = { workspace = true }
sha2 = "0.10"
tar = "0.4"
flate2 = "1"
ratatui = "0.29"
k256 = { workspace = true }
axum = { workspace = true }
uuid = { workspace = true }
rusqlite = { workspace = true }
getrandom = "0.3"

[dev-dependencies]
tempfile = "3"
reqwest = { workspace = true }
