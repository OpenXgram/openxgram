name: Deploy openxgram.org (www)

# 정적 사이트 (www/) 를 GitHub Pages 로 배포.
# CNAME = openxgram.org — DNS A/CNAME 레코드는 별도 (저장소 settings 에서 도메인 등록).
# 보안: untrusted github.event.* 입력 사용 안 함. run: 명령은 정적 npm script 만.

on:
  push:
    branches: [main]
    paths:
      - "www/**"
      - ".github/workflows/deploy-www.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: www
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: www/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: www/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
