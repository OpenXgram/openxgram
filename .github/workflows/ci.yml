name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        # serial_test::file_serial 로 파일 내 직렬화 + 파일 간 병렬화.
        # XGRAM_SKIP_PORT_PRECHECK=1 로 init port precheck skip.
        run: cargo test --workspace --all-targets

  # 6.3.1 — agent 통합 테스트 OS 매트릭스 (linux/macOS/windows).
  # agent.rs 의 platform-conditional 모듈도 cross-OS 빌드 검증 포함.
  test-agent-os-matrix:
    name: agent test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (agent + response + sub_invoker + self-trigger)
        run: cargo test -p openxgram-cli --test agent_inject --test self_trigger_e2e --test cross_node_conversation --test two_node_e2e --lib response::tests --lib sub_invoker::tests

  audit:
    name: cargo audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
          rust-version: stable
