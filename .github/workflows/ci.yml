name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ui/web/dist 는 include_dir 매크로 (crates/openxgram-cli/src/ui_assets.rs) 입력.
  # build.rs 가 placeholder 보장하긴 하지만 진짜 자산이 들어가야 정상 빌드 — 매 job 의
  # cargo step 전에 npm run build 1 회.
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: build web GUI (vite)
        working-directory: ui/web
        run: npm ci && npm run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: build web GUI (vite)
        working-directory: ui/web
        run: npm ci && npm run build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        # serial_test::file_serial 로 파일 내 직렬화 + 파일 간 병렬화.
        # XGRAM_SKIP_PORT_PRECHECK=1 로 init port precheck skip.
        run: cargo test --workspace --all-targets

  # 6.3.1 — agent 통합 테스트 OS 매트릭스 (linux/macOS/windows).
  # agent.rs 의 platform-conditional 모듈도 cross-OS 빌드 검증 포함.
  test-agent-os-matrix:
    name: agent test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: build web GUI (vite)
        working-directory: ui/web
        run: npm ci && npm run build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (agent + response + sub_invoker + self-trigger)
        run: cargo test -p openxgram-cli --test agent_inject --test self_trigger_e2e --test cross_node_conversation --test two_node_e2e --lib response::tests --lib sub_invoker::tests

  audit:
    name: cargo audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # transitive deps 의 unmaintained / unsound informational 만 무시.
          # 우리가 fix 불가능 (source crate 가 수정해야).
          ignore: RUSTSEC-2024-0388,RUSTSEC-2024-0384,RUSTSEC-2024-0436,RUSTSEC-2026-0002

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
          rust-version: stable
