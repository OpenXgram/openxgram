name: Auto tag + release on version bump

# main 브랜치 push 시 Cargo.toml workspace.package.version 검사.
# 새 버전(아직 tag 없음)이면 자동:
#   1. git tag v<version> 생성 + push
#   2. GitHub Release 자동 생성 → release-binaries.yml 자동 트리거 → 5 타겟 zip 빌드
#
# 결과: 마스터가 main 에 push 만 하면 모든 OS 의 binary release 자동 게시.
# Windows / macOS / Linux 사용자 모두 install.ps1 / install.sh 재실행 시 새 binary 받음.

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'

permissions:
  contents: write
  actions: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 모든 tag 받아야 중복 검사 가능

      - name: Extract version from Cargo.toml
        id: ver
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            # workspace.package.version 형식 지원
            VERSION=$(grep -A 1 '\[workspace.package\]' Cargo.toml | grep '^version' | sed -E 's/.*"([^"]+)".*/\1/')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "extracted: $VERSION -> v$VERSION"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "tag ${{ steps.ver.outputs.tag }} already exists — skip"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "tag ${{ steps.ver.outputs.tag }} new — will create"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag + GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        # 각 단계 idempotent — 부분 실패한 이전 run 이 tag/release 일부만 만든 상태에서도
        # 재실행 안전. 핵심: release-binaries.yml dispatch 는 반드시 도달해야 한다
        # (이게 자산 빌드 트리거). 이전엔 앞 단계 한 줄 실패로 dispatch 미도달 → 자산 0개였음.
        run: |
          set -u
          git config user.name "openxgram-bot"
          git config user.email "bot@openxgram.org"

          # 1) tag 생성 + push (이미 존재해도 진행 — push 는 already-exists 무해)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ℹ tag $TAG 이미 로컬 존재 — 재생성 skip"
          else
            git tag -a "$TAG" -m "Auto release $TAG (Cargo.toml version bump)"
          fi
          git push origin "$TAG" || echo "ℹ tag push skip (이미 remote 존재 가능)"

          # 2) Release 생성 (이미 있으면 skip — idempotent)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "ℹ release $TAG 이미 존재 — 생성 skip"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Auto-generated release from main branch Cargo.toml version bump.

            Binary downloads attached after release-binaries.yml workflow completes (~5-10 min).

            Install: \`irm https://openxgram.org/install.ps1 | iex\` (Windows) or \`curl -sSfL https://openxgram.org/install.sh | sh\` (Linux/macOS)" \
              && echo "✓ release created: $TAG" \
              || echo "⚠ release create 실패 (이미 존재 race 가능) — dispatch 는 계속 진행"
          fi

          # 3) release-binaries.yml dispatch — 반드시 도달해야 자산이 빌드됨.
          #    GITHUB_TOKEN 으로 만든 release 는 release event 를 안 발생시켜(재귀 방지)
          #    여기서 명시 workflow_dispatch 로 트리거. 앞 단계가 무엇이든 이 줄은 실행.
          gh workflow run release-binaries.yml --ref "$TAG" -f tag="$TAG" \
            && echo "✓ release-binaries.yml dispatched for $TAG" \
            || { echo "✗ release-binaries.yml dispatch 실패 — 자산 빌드 안 됨"; exit 1; }
