name: Build release binaries

# 5 타겟 병렬 빌드 — CLI 단일 바이너리(`xgram`) 만.
#   linux x86_64 (native) / linux aarch64 (cross via gcc-aarch64-linux-gnu)
#   macOS x86_64 / aarch64 (둘 다 macos-14 ARM runner)
#   windows x86_64 (native msvc)
#
# v0.2.0-rc.24 — Tauri 데스크톱(`xgram-desktop`) 빌드 제거. GUI 는 웹(Tailscale Funnel) 전환.
# `xgram gui` 는 더 이상 별 바이너리를 호출하지 않음 (gui.rs 참조).
# 빌드 시간 기대치: ~30분 → ~5~10분 (libwebkit2gtk + Node + Vite + Tauri Rust 컴파일 제거).
#
# 트리거: release(created/edited) 자동 + workflow_dispatch(tag) 수동.
# 보안: untrusted github.event.* 입력은 env 로만 노출 (run 본문에 직접 보간 X).

on:
  release:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0-alpha.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            asset_suffix: x86_64-linux.tar.gz
          - label: linux-aarch64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            asset_suffix: aarch64-linux.tar.gz
          - label: macos-x86_64
            target: x86_64-apple-darwin
            os: macos-14
            cross: false
            asset_suffix: x86_64-darwin.tar.gz
          - label: macos-aarch64
            target: aarch64-apple-darwin
            os: macos-14
            cross: false
            asset_suffix: aarch64-darwin.tar.gz
          - label: windows-x86_64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            asset_suffix: x86_64-windows.zip
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
      MATRIX_TARGET: ${{ matrix.target }}
      MATRIX_LABEL: ${{ matrix.label }}
      MATRIX_ASSET_SUFFIX: ${{ matrix.asset_suffix }}
      MATRIX_CROSS: ${{ matrix.cross }}
    steps:
      - uses: actions/checkout@v4

      # Web GUI 자산을 xgram 바이너리에 내장 (rc.26+, include_dir 매크로).
      # cargo build 전에 vite build 가 ui/web/dist/ 채워야 진짜 GUI 가 embedded.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: build web GUI (vite)
        shell: bash
        working-directory: ui/web
        run: npm ci && npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross-compile toolchain (aarch64-linux only)
        if: matrix.cross == true
        run: |
          set -eu
          sudo apt-get update
          if [ "$MATRIX_TARGET" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          else
            echo "unknown cross target: $MATRIX_TARGET" >&2
            exit 1
          fi

      - name: Build openxgram-cli
        shell: bash
        env:
          # 의존 crate 가 자체 rust-toolchain.toml 로 다른 채널을 강제하지 못하게 고정.
          RUSTUP_TOOLCHAIN: stable
          # cc crate cross-compile env (aarch64-linux 전용 — windows 는 native msvc).
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        # rc.202 — Windows MSVC 의 cargo incremental fingerprint 가 src 변경 안 detect → 옛 binary.
        # cargo clean -p openxgram-cli 로 강제 fresh build (deps cache 는 reuse).
        run: |
          cargo clean -p openxgram-cli || true
          cargo build --release --target "$MATRIX_TARGET" -p openxgram-cli

      - name: Package + SHA256
        shell: bash
        run: |
          set -eu
          mkdir -p dist
          asset="xgram-${RELEASE_TAG}-${MATRIX_ASSET_SUFFIX}"
          stage="$(mktemp -d)"
          # CLI 바이너리 — 단일.
          case "$MATRIX_TARGET" in
            *windows*) cp "target/$MATRIX_TARGET/release/xgram.exe" "$stage/xgram.exe" ;;
            *)         cp "target/$MATRIX_TARGET/release/xgram"     "$stage/xgram" ;;
          esac
          # v0.2.0-rc.24~: Tauri 데스크톱 바이너리 동봉 안 함 — GUI 는 웹(Tailscale Funnel).
          # SHA256SUMS — 모든 staged 파일에 대해.
          ( cd "$stage" && \
            files=$(ls -1) && \
            if command -v sha256sum >/dev/null; then sha256sum $files > SHA256SUMS;
            else shasum -a 256 $files > SHA256SUMS; fi )
          # 패키징. windows-latest runner 는 zip 명령 없음 — 사전 설치된 7z 사용.
          case "$MATRIX_TARGET" in
            *windows*) ( cd "$stage" && 7z a -tzip "$OLDPWD/dist/$asset" * > /dev/null ) ;;
            *)         tar -C "$stage" -czf "dist/$asset" . ;;
          esac
          ( cd dist && \
            if command -v sha256sum >/dev/null; then sha256sum "$asset" > "$asset.sha256";
            else shasum -a 256 "$asset" > "$asset.sha256"; fi )
          ls -la dist/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*
          fail_on_unmatched_files: true
