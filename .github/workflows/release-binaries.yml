name: Build release binaries

# 5 타겟 병렬 빌드:
#   linux x86_64 / linux aarch64 (cross via gcc-aarch64-linux-gnu, aarch64 는 CLI 만)
#   macOS x86_64 / aarch64 (macos-14 ARM runner — x86_64 via cross-compile, ARM native, 둘 다 GUI 동봉)
#   windows x86_64 (windows-latest msvc native — WebView2 사전 포함, GUI 동봉)
#
# 트리거: release(created/edited) 자동 + workflow_dispatch(tag) 수동.
# 보안: untrusted github.event.* 입력은 env 로만 노출 (run 본문에 직접 보간 X).

on:
  release:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0-alpha.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # with_gui: Tauri 데스크톱 앱(`xgram-desktop`) 도 같이 빌드 + tarball 동봉.
          #   - linux-aarch64: 크로스 빌드 환경에서 webkit 호환 어려워 CLI 만 ship.
          #   - windows: native windows-latest 로 빌드 (WebView2 사전 포함) — GUI 동봉.
          #   - 미동봉 매트릭스에선 `xgram gui` 가 명시적 안내 에러 (silent fallback 금지).
          - label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            with_gui: true
            asset_suffix: x86_64-linux.tar.gz
          - label: linux-aarch64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            with_gui: false
            asset_suffix: aarch64-linux.tar.gz
          - label: macos-x86_64
            target: x86_64-apple-darwin
            os: macos-14
            cross: false
            with_gui: true
            asset_suffix: x86_64-darwin.tar.gz
          - label: macos-aarch64
            target: aarch64-apple-darwin
            os: macos-14
            cross: false
            with_gui: true
            asset_suffix: aarch64-darwin.tar.gz
          - label: windows-x86_64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            with_gui: true
            asset_suffix: x86_64-windows.zip
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
      MATRIX_TARGET: ${{ matrix.target }}
      MATRIX_LABEL: ${{ matrix.label }}
      MATRIX_ASSET_SUFFIX: ${{ matrix.asset_suffix }}
      MATRIX_CROSS: ${{ matrix.cross }}
      MATRIX_WITH_GUI: ${{ matrix.with_gui }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross-compile toolchain (aarch64-linux only)
        if: matrix.cross == true
        run: |
          set -eu
          sudo apt-get update
          if [ "$MATRIX_TARGET" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          else
            echo "unknown cross target: $MATRIX_TARGET" >&2
            exit 1
          fi

      - name: Build openxgram-cli
        shell: bash
        env:
          # 의존 crate 가 자체 rust-toolchain.toml 로 다른 채널을 강제하지 못하게 고정.
          RUSTUP_TOOLCHAIN: stable
          # cc crate cross-compile env (aarch64-linux 전용 — windows 는 native msvc).
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build --release --target "$MATRIX_TARGET" -p openxgram-cli

      - name: Install GUI build dependencies (Linux)
        if: matrix.with_gui == true && matrix.os == 'ubuntu-latest'
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libssl-dev \
            pkg-config

      - name: Setup Node 20 (GUI frontend build)
        if: matrix.with_gui == true
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/tauri/app/package-lock.json

      - name: Build GUI frontend (Vite)
        if: matrix.with_gui == true
        working-directory: ui/tauri/app
        run: |
          npm ci
          npm run build

      - name: Build openxgram-desktop (Tauri binary, no installers)
        if: matrix.with_gui == true
        shell: bash
        env:
          RUSTUP_TOOLCHAIN: stable
        # ui/tauri 는 워크스페이스 외부 — 자체 Cargo.lock 보유. tauri-cli 없이 cargo 만으로
        # 바이너리 빌드 (frontendDist=app/dist 가 직전 step 에서 생성됨).
        working-directory: ui/tauri
        run: cargo build --release --target "$MATRIX_TARGET" -p openxgram-desktop

      - name: Package + SHA256
        shell: bash
        run: |
          set -eu
          mkdir -p dist
          asset="xgram-${RELEASE_TAG}-${MATRIX_ASSET_SUFFIX}"
          stage="$(mktemp -d)"
          # CLI 바이너리 필수.
          case "$MATRIX_TARGET" in
            *windows*) cp "target/$MATRIX_TARGET/release/xgram.exe" "$stage/xgram.exe" ;;
            *)         cp "target/$MATRIX_TARGET/release/xgram"     "$stage/xgram" ;;
          esac
          # GUI 바이너리 — with_gui=true 매트릭스에서만 빌드됨. 발견 시 함께 동봉.
          gui_src="ui/tauri/target/$MATRIX_TARGET/release/openxgram-desktop"
          case "$MATRIX_TARGET" in
            *windows*)
              gui_src="${gui_src}.exe"
              gui_dest="xgram-desktop.exe"
              ;;
            *)
              gui_dest="xgram-desktop"
              ;;
          esac
          if [ -f "$gui_src" ]; then
            cp "$gui_src" "$stage/$gui_dest"
            echo "✓ GUI binary 동봉: $gui_dest"
          else
            echo "(GUI binary 미빌드 — CLI only)"
          fi
          # SHA256SUMS — 모든 staged 파일에 대해.
          ( cd "$stage" && \
            files=$(ls -1) && \
            if command -v sha256sum >/dev/null; then sha256sum $files > SHA256SUMS;
            else shasum -a 256 $files > SHA256SUMS; fi )
          # 패키징. windows-latest runner 는 zip 명령 없음 — 사전 설치된 7z 사용.
          case "$MATRIX_TARGET" in
            *windows*) ( cd "$stage" && 7z a -tzip "$OLDPWD/dist/$asset" * > /dev/null ) ;;
            *)         tar -C "$stage" -czf "dist/$asset" . ;;
          esac
          ( cd dist && \
            if command -v sha256sum >/dev/null; then sha256sum "$asset" > "$asset.sha256";
            else shasum -a 256 "$asset" > "$asset.sha256"; fi )
          ls -la dist/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*
          fail_on_unmatched_files: true
