<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenXgram</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0e1014;
        --fg: #e6edf3;
        --accent: #3fb950;
        --warn: #d29922;
        --fail: #f85149;
        --muted: #8b949e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        padding: 24px;
      }
      h1 { margin: 0 0 4px; font-size: 22px; }
      .sub { color: var(--muted); margin-bottom: 24px; }
      .checks { border: 1px solid #21262d; border-radius: 8px; overflow: hidden; }
      .check { display: flex; gap: 12px; padding: 10px 14px; border-bottom: 1px solid #21262d; }
      .check:last-child { border-bottom: 0; }
      .verdict { font-weight: 700; min-width: 60px; }
      .verdict.ok { color: var(--accent); }
      .verdict.warn { color: var(--warn); }
      .verdict.fail { color: var(--fail); }
      .name { min-width: 200px; }
      .detail { color: var(--muted); flex: 1; word-break: break-word; }
      pre { background: #161b22; padding: 12px; border-radius: 6px; font-size: 12px; overflow: auto; }
      button {
        background: var(--accent); color: #0e1014; border: 0; padding: 8px 16px;
        border-radius: 6px; font-weight: 600; cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: wait; }
    </style>
  </head>
  <body>
    <h1>OpenXgram</h1>
    <div class="sub" id="version">로드 중...</div>
    <button id="refresh">새로고침</button>
    <h2 style="margin-top:24px">Doctor 점검</h2>
    <div id="checks"></div>
    <script type="module">
      // textContent only — innerHTML 사용 금지 (XSS 방지)
      const invoke = window.__TAURI__?.core?.invoke;
      const checksEl = document.getElementById('checks');
      const versionEl = document.getElementById('version');

      if (!invoke) {
        const h1 = document.querySelector('h1');
        h1.textContent = '오류';
        const msg = document.createElement('p');
        msg.textContent = 'Tauri 환경이 아닙니다. cargo tauri dev 로 실행하세요.';
        h1.after(msg);
      }

      function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

      function makeCheckRow(check) {
        const row = document.createElement('div');
        row.className = 'check';
        const verdict = document.createElement('span');
        verdict.className = `verdict ${check.verdict}`;
        verdict.textContent = String(check.verdict).toUpperCase();
        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = check.name;
        const detail = document.createElement('span');
        detail.className = 'detail';
        detail.textContent = check.detail;
        row.append(verdict, name, detail);
        return row;
      }

      function showError(text) {
        clear(checksEl);
        const pre = document.createElement('pre');
        pre.textContent = text;
        checksEl.appendChild(pre);
      }

      async function refresh() {
        const btn = document.getElementById('refresh');
        btn.disabled = true;
        try {
          const ver = await invoke('get_version');
          if (ver.success) {
            const v = JSON.parse(ver.output);
            versionEl.textContent = `xgram ${v.version} (${v.target})`;
          } else {
            versionEl.textContent = ver.output;
          }
          const status = await invoke('get_status');
          clear(checksEl);
          if (!status.success) {
            showError(status.output);
            return;
          }
          const data = JSON.parse(status.output);
          checksEl.className = 'checks';
          for (const c of data.checks) {
            checksEl.appendChild(makeCheckRow(c));
          }
        } finally {
          btn.disabled = false;
        }
      }

      document.getElementById('refresh').addEventListener('click', refresh);
      if (invoke) refresh();
    </script>
  </body>
</html>
