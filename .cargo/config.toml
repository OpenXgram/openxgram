[profile.dev]
# 개발 빌드: 빠른 컴파일, 디버그 심볼 포함
opt-level = 0
debug = true
incremental = true

[profile.release]
# 릴리즈 빌드: 최적화 + LTO
opt-level = 3
debug = false
lto = "thin"
codegen-units = 1
strip = "symbols"

[profile.release-debug]
# 릴리즈 빌드 + 디버그 심볼 (성능 프로파일링용)
inherits = "release"
debug = true
strip = "none"

# ─────────────────────────────────────────────────────────────────────────────
# Cross-compile linker overrides (CI + 로컬 cross 빌드 공용)
#   linux-aarch64: `apt install gcc-aarch64-linux-gnu`
#   windows-gnu(x86_64): `apt install mingw-w64`
# silent fallback 금지 — 해당 패키지 미설치 시 cargo 가 명시적으로 실패한다.
# ─────────────────────────────────────────────────────────────────────────────
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
